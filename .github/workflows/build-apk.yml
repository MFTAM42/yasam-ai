name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Wait for GitHub Pages
        run: sleep 30

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json <<'EOF'
          {
            "packageId": "com.yasamai.app",
            "host": "mftam42.github.io",
            "name": "Yaşam.AI",
            "launcherName": "Yaşam.AI",
            "display": "standalone",
            "themeColor": "#7c5cef",
            "navigationColor": "#0f1220",
            "navigationColorDark": "#0f1220",
            "navigationDividerColor": "#0f1220",
            "navigationDividerColorDark": "#0f1220",
            "backgroundColor": "#0f1220",
            "enableNotifications": true,
            "startUrl": "/yasam-ai/",
            "iconUrl": "https://mftam42.github.io/yasam-ai/icon-512.png",
            "maskableIconUrl": "https://mftam42.github.io/yasam-ai/icon-512.png",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://mftam42.github.io/yasam-ai/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "orientation": "portrait",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            }
          }
          EOF

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android.keystore \
            -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass yasamai123 -keypass yasamai123 \
            -dname "CN=YasamAI, OU=App, O=YasamAI, L=Istanbul, S=Istanbul, C=TR"

      - name: Bubblewrap init + build
        run: |
          echo "yasamai123" > /tmp/pw.txt
          bubblewrap build --skipPwaValidation \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias=android \
          < /tmp/pw.txt || true
          ls -la *.apk *.aab 2>/dev/null || echo "Build outputs:"
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yasamai-apk
          path: |
            ./*.apk
            ./*.aab
          if-no-files-found: warn
